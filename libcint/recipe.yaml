context:
  name: libcint
  version: 6.1.3

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/sunqm/libcint/archive/refs/tags/v${{ version }}.tar.gz
  sha256: e4d977d4aeb4d5b87639ea57a2d2f1d5c1001f3f94e480b08c297a6cbc186f27
  patches:
    - 0001-Fix-test-location.patch

build:
  number: 0
  script:
    content: |
      cmake ${CMAKE_ARGS} -DCMAKE_BUILD_TYPE=Release \
        -DCMAKE_INSTALL_PREFIX=$PREFIX \
        -DCMAKE_INSTALL_LIBDIR=lib \
        -DBUILD_SHARED_LIBS=ON \
        -S . \
        -B build
      cmake --build build -j ${CPU_COUNT}
      cmake --install build

requirements:
  build:
    - ${{ compiler('c') }}
    - ${{ stdlib("c") }}
    - cmake
    - make
  run_exports:
    - ${{ pin_subpackage(name, lower_bound="x.x", upper_bound="x.x") }}

tests:
  - script:
      - cd testsuite
      - python test_cint.py --quick
      - python test_3c2e.py --quick
    requirements:
      run:
        - python
        - numpy
    files:
      source:
        - testsuite/

about:
  homepage: https://github.com/sunqm/libcint
  summary: general GTO integrals for quantum chemistry
  repository: https://github.com/sunqm/libcint
  documentation: http://wiki.sunqm.net/libcint
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - BastianZim
    - chillenb
