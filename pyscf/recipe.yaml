
context:
  name: pyscf
  version: 2.13.0
  build_num: 9

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://github.com/pyscf/pyscf/archive/refs/tags/v${{ version }}.tar.gz
  sha256: b0f22880d918d3ae7cf6abb5629c457d2e58a572e22695ee849b17efa05c57d2
  patches:
    - 0001-remove-stderr-from-openmp-shared.patch
    - 0002-win-compat.patch
    - 0003-win-export-symbols.patch
    - 0005-win-pbc-cint.patch
    - 0006-win-xc-wrappers.patch
    - 0007-win-more-wrappers.patch

build:
  python:
    version_independent: true
  number: ${{ (build_num | int) + 100 * microarch_level }}
  script:
    - if: unix
      then:
        - if [ "${{ microarch_level }}" -gt 1 ]; then export CFLAGS="${CFLAGS} -march=x86-64-v${{ microarch_level }} -mtune=cascadelake"; export CXXFLAGS="${CXXFLAGS} -march=x86-64-v${{ microarch_level }} -mtune=cascadelake"; fi
        - export CMAKE_BUILD_PARALLEL_LEVEL=4
        - export CMAKE_CONFIGURE_ARGS="${CMAKE_ARGS} -DBLAS_LIBRARIES=lapack;blas -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=$PREFIX -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DBUILD_LIBCINT=OFF -DBUILD_LIBXC=OFF -DBUILD_XCFUN=OFF -LAH"
        - ${{ PYTHON }} -m pip install . -vv
    - if: win
      then:
        - set CMAKE_GENERATOR=Ninja
        - set CMAKE_GENERATOR_PLATFORM=
        - set CMAKE_GENERATOR_TOOLSET=
        - set CMAKE_BUILD_PARALLEL_LEVEL=4
        - set LDFLAGS=%LDFLAGS% -L%LIBRARY_PREFIX%\bin
        - set CMAKE_CONFIGURE_ARGS=%CMAKE_ARGS% -DCMAKE_C_COMPILER=%CC% -DCMAKE_CXX_COMPILER=%CXX% -DBLAS_LIBRARIES=mkl_rt -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=%LIBRARY_PREFIX% -DCMAKE_INSTALL_LIBDIR=lib -DBUILD_SHARED_LIBS=ON -DBUILD_LIBCINT=OFF -DBUILD_LIBXC=OFF -DBUILD_XCFUN=OFF -LAH
        - call %PYTHON% -m pip install . -vv

requirements:
  build:
    - if: win
      then: gcc_win-64
      else: ${{ compiler('c') }}
    - if: win
      then: gxx_win-64
      else: ${{ compiler('cxx') }}
    - cmake >=3.10
    - if: win
      then: ninja
    - python
    - setuptools
  host:
    - libblas
    - libcint
    - libxc-c >=6,<8
    - make
    - pip
    - python
    - setuptools
    - xcfun ==2.1.1
    - if: linux
      then:
        - libgomp
  run:
    - if: win
      then: psutil
    - h5py >=2.7
    - numpy >=1.13,!=1.16,!=1.17
    - python
    - scipy >=0.19,!=1.5.0,!=1.5
    - setuptools
    - if: x86_64
      then:
        - _x86_64-microarch-level >=${{ microarch_level }}
  run_constraints:
    - pyberny >=0.6.2
    - geometric >=0.9.7.2

about:
  homepage: https://pyscf.org
  summary: 'PySCF: Python-based Simulations of Chemistry Framework'
  license: Apache-2.0
  license_file: LICENSE
  repository: https://github.com/pyscf/pyscf

